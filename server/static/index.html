<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HDU 图书馆抢座</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>📚 HDU 图书馆抢座</h1>
      <p class="subtitle">自动预约 + 自动签到</p>
    </div>

    <div class="content">
      <!-- 状态卡片 -->
      <div class="card">
        <div class="card-title">📌 当前状态</div>
        <div class="card-info">
          <div class="status-row">
            <span>登录状态</span>
            <span id="login-status" class="status-badge">检查中...</span>
          </div>
          <div class="status-row">
            <span>自动预约</span>
            <span id="book-status" class="status-badge">检查中...</span>
          </div>
          <div class="status-row">
            <span>自动签到</span>
            <span id="checkin-status" class="status-badge">检查中...</span>
          </div>
        </div>
      </div>

      <!-- 今日预约 -->
      <div class="card">
        <div class="card-title">📋 今日预约</div>
        <div id="bookings-list" class="card-info">
          <div class="loading">加载中...</div>
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="actions">
        <button class="btn primary" onclick="manualBook()">立即预约</button>
        <button class="btn" onclick="manualCheckin()">立即签到</button>
        <button class="btn" onclick="refreshStatus()">刷新状态</button>
      </div>

      <!-- 日志 -->
      <div class="card">
        <div class="card-title">📝 运行日志</div>
        <div id="log-list" class="log-container">
          <div class="loading">暂无日志</div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/static/app.js"></script>
</body>
</html>
