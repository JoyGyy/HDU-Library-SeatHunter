[phases.setup]
nixPkgs = ["...", "chromium", "firefox"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium",
  "playwright install-deps chromium"
]

[phases.build]
cmds = ["echo Build complete"]

[start]
cmd = "python -m uvicorn server.main:app --host 0.0.0.0 --port $PORT"
